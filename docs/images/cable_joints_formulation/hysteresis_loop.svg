<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="Capstan hysteresis loop mechanism">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#263238"/>
    </marker>
    <marker id="blueArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#1f67d2"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#2f8f46"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#c84b31"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="420" rx="14" fill="#fbfcff"/>
  <text x="40" y="44" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#16202a">Hysteresis from a latched rest-length distribution</text>
  <text x="40" y="72" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#53616f">The static capstan cone gives two slip boundaries. Rest lengths only change when a boundary is violated.</text>

  <line x1="118" y1="340" x2="820" y2="340" stroke="#263238" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="118" y1="340" x2="118" y2="92" stroke="#263238" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="382" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#16202a">applied tension T_app</text>
  <text x="30" y="218" transform="rotate(-90 30 218)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#16202a">fixed tension T_fix</text>

  <line x1="118" y1="340" x2="780" y2="112" stroke="#a7b0bc" stroke-width="2" stroke-dasharray="7 7"/>
  <line x1="118" y1="340" x2="780" y2="218" stroke="#8bb9ff" stroke-width="2" stroke-dasharray="8 7"/>
  <line x1="118" y1="340" x2="360" y2="92" stroke="#ff9a8d" stroke-width="2" stroke-dasharray="8 7"/>

  <path d="M 118 340 L 715 229" fill="none" stroke="#1f67d2" stroke-width="5" marker-end="url(#blueArrow)"/>
  <path d="M 715 229 L 365 229" fill="none" stroke="#2f8f46" stroke-width="5" marker-end="url(#greenArrow)"/>
  <path d="M 365 229 L 132 333" fill="none" stroke="#c84b31" stroke-width="5" marker-end="url(#redArrow)"/>

  <circle cx="715" cy="229" r="6" fill="#16202a"/>
  <text x="724" y="218" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#16202a">peak load</text>
  <text x="458" y="276" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#1f67d2">1 loading slip</text>
  <text x="476" y="216" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#2f8f46">2 stick plateau</text>
  <text x="206" y="296" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#c84b31">3 reverse slip</text>

  <rect x="620" y="102" width="268" height="116" rx="8" fill="#eef6ff" stroke="#bad7ff"/>
  <text x="640" y="132" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15" fill="#16202a">loading:  T_fix = T_app/alpha</text>
  <text x="640" y="160" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15" fill="#16202a">stick:    delta = 0</text>
  <text x="640" y="188" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15" fill="#16202a">unload:   T_fix = alpha T_app</text>
</svg>
