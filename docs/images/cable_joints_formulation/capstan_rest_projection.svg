<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="Capstan rest length projection">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#263238"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="420" rx="14" fill="#fbfcff"/>
  <text x="40" y="44" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700" fill="#16202a">Capstan projection: rest length moves until the bound is active</text>
  <text x="40" y="72" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#53616f">Right side too tight example. Total rest length is conserved: r_l + r_r = constant.</text>

  <text x="70" y="124" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#16202a">Before</text>
  <rect x="150" y="104" width="210" height="36" rx="7" fill="#dbeafe" stroke="#1f67d2"/>
  <rect x="390" y="104" width="330" height="36" rx="7" fill="#ffe4d6" stroke="#d9822b"/>
  <text x="232" y="128" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#16202a">r_l</text>
  <text x="542" y="128" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#16202a">r_r</text>
  <text x="748" y="128" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15" fill="#c84b31">T_r &gt; alpha T_l</text>

  <path d="M 320 168 C 350 198 395 207 438 230" fill="none" stroke="#c84b31" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="370" y="198" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#c84b31">delta</text>

  <text x="70" y="274" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#16202a">After</text>
  <rect x="150" y="254" width="174" height="36" rx="7" fill="#dbeafe" stroke="#1f67d2"/>
  <rect x="354" y="254" width="366" height="36" rx="7" fill="#ffe4d6" stroke="#d9822b"/>
  <text x="188" y="278" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#16202a">r_l - delta</text>
  <text x="480" y="278" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#16202a">r_r + delta</text>
  <text x="748" y="278" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="15" fill="#2f7d32">T_r' = alpha T_l'</text>

  <rect x="82" y="322" width="804" height="70" rx="8" fill="#eef6ff" stroke="#bad7ff"/>
  <text x="106" y="350" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16" fill="#16202a">(e_r - delta)/c_r = alpha (e_l + delta)/c_l</text>
  <text x="106" y="376" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16" fill="#16202a">delta = (c_l e_r - alpha c_r e_l) / (c_l + alpha c_r)</text>
</svg>
