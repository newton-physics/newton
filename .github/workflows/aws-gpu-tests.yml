name: GPU Unit Tests on AWS

# Workflow configuration variables
env:
  AWS_REGION: us-east-2
  AWS_INSTANCE_TYPE: g6.xlarge
  AWS_VOLUME_SIZE: 64
  AWS_VOLUME_TYPE: gp3
  AWS_SECURITY_GROUP_IDS: sg-07807c44e7f2a368a
  AWS_ROLE_ARN: arn:aws:iam::968945269301:role/newton-physics-newton-github-actions-role-Role-GbdM0RBoT4xW
  AWS_ROLE_DURATION: 3600
  AWS_S3_BUCKET: newton-github-workflow-artifacts

on:
  pull_request_target:
  push:

# Cancels in-progress runs of this workflow for the same pull request,
# but allows parallel runs for pushes to the main branch.
# This prevents redundant runs on PR branches while not affecting other triggers.
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run-unit-tests-on-aws:
    if: github.repository == 'newton-physics/newton'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-duration-seconds: ${{ env.AWS_ROLE_DURATION }}

      - name: Launch EC2 instance with latest NVIDIA AMI
        id: launch
        run: |
          echo "Finding the latest AWS Deep Learning Base GPU AMI..."
          LATEST_AMI_ID=$(aws ssm get-parameter --region ${{ env.AWS_REGION }} \
            --name /aws/service/deeplearning/ami/x86_64/base-oss-nvidia-driver-gpu-ubuntu-24.04/latest/ami-id \
            --query "Parameter.Value" \
            --output text)
          if [[ -z "$LATEST_AMI_ID" ]]; then
            echo "❌ No AMI ID found. Exiting."
            exit 1
          fi

          echo "Latest AMI ID found: $LATEST_AMI_ID"
          echo "Launching EC2 instance..."

          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id $LATEST_AMI_ID \
            --region ${{ env.AWS_REGION }} \
            --instance-type ${{ env.AWS_INSTANCE_TYPE }} \
            --security-group-ids ${{ env.AWS_SECURITY_GROUP_IDS }} \
            --iam-instance-profile Name="NewtonEC2InstanceRole" \
            --block-device-mappings "DeviceName=/dev/sda1,Ebs={VolumeSize=${{ env.AWS_VOLUME_SIZE }},VolumeType=${{ env.AWS_VOLUME_TYPE }}}" \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=newton-github-workflow-runner},{Key=created-by,Value=github-actions-newton-role}]' \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "Instance launched with ID: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"

          echo "Waiting for instance to be running..."
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID

      - name: Create and Run Remote Script
        env:
          BRANCH_NAME_ENV: ${{ github.head_ref || github.ref_name }}
        run: |
          # The name of the S3 bucket for storing results
          S3_BUCKET="${{ env.AWS_S3_BUCKET }}"
          # A unique key for this run to avoid file collisions
          S3_KEY="reports/${{ github.run_id }}/${{ github.run_attempt }}"
          ssm_log_prefix="ssm-logs/${{ github.run_id }}/${{ github.run_attempt }}"
          safe_branch=$(printf '%q' "${BRANCH_NAME_ENV}")

          # --- Step 1: Create the remote script locally ---
          cat << EOF > remote_script.sh
          #!/bin/bash
          set -e
          set -o pipefail

          # These are expanded immediately on the GitHub runner
          S3_BUCKET="${S3_BUCKET}"
          S3_KEY="${S3_KEY}"

          function finish {
              # This is escaped to run on the remote instance
              EXIT_CODE=\$?
              echo "--- Script finished with exit code \$EXIT_CODE ---"
              ls -la /tmp
              if [ \$EXIT_CODE -eq 0 ]; then
                  echo "Success" > /tmp/status.txt
              else
                  echo "Failed" > /tmp/status.txt
              fi
              # These S3 variables are already hardcoded, but escaping is good practice
              aws s3 cp /tmp/test_output.log "s3://\${S3_BUCKET}/\${S3_KEY}/test_output.log" 2>&1 || true
              aws s3 cp /tmp/rspec.xml "s3://\${S3_BUCKET}/\${S3_KEY}/rspec.xml" 2>&1 || true
              aws s3 cp /tmp/coverage.xml "s3://\${S3_BUCKET}/\${S3_KEY}/coverage.xml" 2>&1 || true
              aws s3 cp /tmp/status.txt "s3://\${S3_BUCKET}/\${S3_KEY}/status.txt" 2>&1 || true
          }
          trap finish EXIT

          echo "--- Starting sequence on EC2 instance ---"
          date

          # These are expanded immediately on the GitHub runner
          REPO_URL="https://github.com/${{ github.repository }}.git"
          BRANCH_NAME="${safe_branch}"
          REPO_DIR="${{ github.event.repository.name }}"

          curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="/tmp/uv-installation" sh
          source /tmp/uv-installation/env

          # --- Cloning Repository ---
          # The variables here are now hardcoded with the correct values from the runner
          git clone --branch "\$BRANCH_NAME" "\$REPO_URL"
          cd "\$REPO_DIR"

          # --- Running Tests ---
          echo "Running Newton test suite..."
          uv run --extra dev --extra cu12 -m newton.tests --junit-report-xml /tmp/rspec.xml --coverage --coverage-xml /tmp/coverage.xml --serial-fallback 2>&1 | tee /tmp/test_output.log
          EOF

          # --- Step 2: Send the command, reading the script from the file ---

          echo "--- Preparing SSM parameters ---"
          # Use jq to safely embed the script content into a valid JSON structure.
          # -n: read no input | --arg: set a variable | -R: read raw string | -s: slurp all input
          jq -n --arg script_body "$(cat remote_script.sh)" \
          '{ "commands": [$script_body] }' > ssm_params.json

          echo "--- Sending command to instance $INSTANCE_ID via SSM ---"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Running Newton GPU unit tests" \
            --parameters file://ssm_params.json \
            --output-s3-bucket-name "$S3_BUCKET" \
            --output-s3-key-prefix "$ssm_log_prefix" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"

          # --- Step 3: Wait for the command to complete ---
          echo "--- Waiting for command to complete... ---"
          final_status="Success" # Assume success initially
          TIMEOUT=3600
          INTERVAL=30
          elapsed_time=0

          while [ $elapsed_time -lt $TIMEOUT ]; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)
            
            if [[ "$STATUS" == "Success" ]]; then
              # final_status is already "Success"
              break
            elif [[ "$STATUS" == "InProgress" || "$STATUS" == "Pending" ]]; then
              # Continue waiting for these expected running statuses
              :
            else
              # Catch all other statuses (failures and unexpected statuses)
              final_status="$STATUS"
              echo "SSM command failed or returned unexpected status: $STATUS"
              break
            fi
            
            sleep $INTERVAL
            elapsed_time=$((elapsed_time + INTERVAL))
            echo "Current status: $STATUS. Waited $elapsed_time seconds..."
          done

          # Check if the loop exited due to a timeout
          if [ $elapsed_time -ge $TIMEOUT ]; then
            final_status="Timeout"
          fi

          # --- Step 4: Always download and display artifacts ---
          echo "--- Downloading artifacts from S3 ---"
          aws s3 cp "s3://${S3_BUCKET}/${S3_KEY}/" . --recursive

          echo "--- Displaying test_output.log ---"
          if [ -f "test_output.log" ]; then
            cat test_output.log
          else
            echo "test_output.log not found."
          fi
          echo "--- End of test_output.log ---"

          # --- Step 5: Final status check ---
          # Only check the artifacts if the SSM command was successful.
          if [[ "$final_status" == "Success" ]]; then
            if [ ! -f "status.txt" ]; then
              final_status="MissingStatusFile"
            elif [ "$(cat status.txt)" == "Failed" ]; then
              final_status="RemoteScriptFailed"
            elif [ ! -f "rspec.xml" ]; then
              final_status="MissingRspecFile"
            elif [ ! -f "coverage.xml" ]; then
              final_status="MissingCoverageFile"
            fi
          fi

          # Now, check the final overall status and exit if not successful
          if [[ "$final_status" != "Success" ]]; then
            echo "❌ Workflow failed with status: $final_status"
            exit 1
          else
            echo "✅ Workflow completed successfully."
          fi
      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86
        with:
          paths: "rspec.xml"
          show: "fail"
        if: always()
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@f2dba722c67b86c6caa034178c6e4d35335f6706
        with:
          files: ./rspec.xml
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d
        with:
          env_vars: OS
          files: ./coverage.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Terminate EC2 Instance
        if: always()
        run: |
          if [ -n "$INSTANCE_ID" ]; then
            echo "Terminating instance: $INSTANCE_ID"
            aws ec2 terminate-instances --instance-ids $INSTANCE_ID
          else
            echo "No instance ID file found - instance may not have been launched"
          fi
