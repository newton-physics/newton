name: Public API Change Detection
permissions: {}

on:
  pull_request_target:
    branches:
      - main
      - "release-*"

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-author-membership:
    name: Check Author Membership
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      membership_status: ${{ steps.check_org.outputs.membership_status }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Check user's organization membership
        id: check_org
        run: |
          ASSOCIATION="${{ github.event.pull_request.author_association }}"
          echo "Author's association with the repository: ${ASSOCIATION}"

          if [[ "${ASSOCIATION}" == "MEMBER" || "${ASSOCIATION}" == "OWNER" || "${ASSOCIATION}" == "COLLABORATOR" ]]; then
            echo "membership_status=CONFIRMED_MEMBER" >> "$GITHUB_OUTPUT"
          else
            echo "membership_status=NOT_MEMBER" >> "$GITHUB_OUTPUT"
            echo "::warning::Public API change detection requires manual approval for external PRs."
          fi

  require-approval:
    name: Require Manual Approval for External PRs
    runs-on: ubuntu-latest
    permissions:
      deployments: write  # Required for creating deployment record when using environment
    needs: check-author-membership
    if: needs.check-author-membership.outputs.membership_status != 'CONFIRMED_MEMBER'
    environment:
      name: external-pr-approval
      url: ${{ github.event.pull_request.html_url }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: audit

      - name: Approval granted
        run: echo "Manual approval granted for external PR"

  detect-api-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    needs:
      - check-author-membership
      - require-approval
    if: >-
      github.repository == 'newton-physics/newton' &&
      !cancelled() &&
      (needs.check-author-membership.outputs.membership_status == 'CONFIRMED_MEMBER' ||
       needs.require-approval.result == 'success')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout PR head
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout base branch history
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: "base/.python-version"

      - name: Checkout PR merge base
        id: merge_base
        run: |
          script_path="${RUNNER_TEMP}/detect_api_changes.py"
          git -C base show "${{ github.event.pull_request.base.sha }}:.github/scripts/detect_api_changes.py" > "$script_path"

          git -C base fetch --no-tags ../head HEAD:refs/remotes/pr/head
          merge_base=$(git -C base merge-base HEAD refs/remotes/pr/head)
          git -C base checkout --detach "$merge_base"

          echo "script_path=$script_path" >> "$GITHUB_OUTPUT"
          echo "merge_base=$merge_base" >> "$GITHUB_OUTPUT"

      - name: Detect API changes
        id: detect
        env:
          API_COMMENT_PATH: ${{ runner.temp }}/api-comment.md
        run: |
          output=$(python "${{ steps.merge_base.outputs.script_path }}" base head)
          has_changes=$(printf '%s' "$output" | python -c "import sys, json; print(str(json.load(sys.stdin)['diff']['has_changes']).lower())")
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"

          printf '%s' "$output" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['comment'])
          " > "$API_COMMENT_PATH"

      - name: Add api-changes label
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['api-changes']
            });

      - name: Remove api-changes label if no changes
        if: steps.detect.outputs.has_changes == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'api-changes'
              });
            } catch (e) {
              // Label may not exist on the PR; ignore 404
              if (e.status !== 404) throw e;
            }

      - name: Post or update comment
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        env:
          API_COMMENT_PATH: ${{ runner.temp }}/api-comment.md
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.API_COMMENT_PATH, 'utf8').trim();
            if (!body) return;

            const marker = '<!-- newton-api-changes -->';
            const fullBody = `${marker}\n${body}`;
            const isApiChangesComment = (comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.user?.type === 'Bot' &&
              comment.body?.startsWith(marker);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(isApiChangesComment);

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Delete comment if no API changes
        if: steps.detect.outputs.has_changes == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const marker = '<!-- newton-api-changes -->';
            const isApiChangesComment = (comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.user?.type === 'Bot' &&
              comment.body?.startsWith(marker);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(isApiChangesComment);
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
