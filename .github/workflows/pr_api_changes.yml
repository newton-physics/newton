name: Public API Change Detection
permissions:
  contents: read
  issues: write

on:
  pull_request_target:
    branches:
      - main
      - "release-*"

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-api-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594  # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Checkout PR head
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          persist-credentials: false

      - name: Checkout base branch
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: "base/.python-version"

      - name: Detect API changes
        id: detect
        run: |
          output=$(python base/.github/scripts/detect_api_changes.py base head)
          has_changes=$(echo "$output" | python -c "import sys, json; print(json.load(sys.stdin)['diff']['has_changes'])")
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"

          comment=$(echo "$output" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['comment'])
          ")
          # Write comment body to file for multi-line handling
          echo "$comment" > /tmp/api-comment.md

      - name: Add api-changes label
        if: steps.detect.outputs.has_changes == 'True'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['api-changes']
            });

      - name: Remove api-changes label if no changes
        if: steps.detect.outputs.has_changes == 'False'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'api-changes'
              });
            } catch (e) {
              // Label may not exist on the PR; ignore 404
              if (e.status !== 404) throw e;
            }

      - name: Post or update comment
        if: steps.detect.outputs.has_changes == 'True'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/api-comment.md', 'utf8').trim();
            if (!body) return;

            const marker = '<!-- newton-api-changes -->';
            const fullBody = `${marker}\n${body}`;

            // Find existing comment from this action
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Delete comment if no API changes
        if: steps.detect.outputs.has_changes == 'False'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const marker = '<!-- newton-api-changes -->';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
